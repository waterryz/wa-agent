<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alex — Prime Fusion (тест)</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e7e9ee;--muted:#9aa3b2;--accent:#3b82f6;--user:#2563eb;--alex:#222733;--warn:#d97706}
  *{box-sizing:border-box}
  html,body{height:100%}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt);display:flex;flex-direction:column}
  header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--card)}
  header .t{font-weight:700;line-height:1.2}
  header .t small{display:block;color:var(--muted);font-weight:400;font-size:12px}
  header a,header button{color:var(--muted);background:none;border:1px solid var(--line);border-radius:8px;padding:6px 10px;font-size:13px;cursor:pointer;text-decoration:none}
  header .panel{border-color:var(--accent);background:var(--accent);color:#fff;font-weight:600}
  main{flex:1;overflow-y:auto;padding:18px 14px;width:100%;max-width:760px;margin:0 auto}
  .msg{display:flex;margin:10px 0}
  .msg.u{justify-content:flex-end}
  .col{max-width:80%;display:flex;flex-direction:column}
  .bubble{padding:10px 13px;border-radius:14px;line-height:1.45;white-space:pre-wrap;word-wrap:break-word}
  .u .bubble{background:var(--user);color:#fff;border-bottom-right-radius:4px}
  .a .bubble{background:var(--alex);border:1px solid var(--line);border-bottom-left-radius:4px}
  .esc{font-size:12px;color:var(--warn);margin-top:3px}
  .meta{font-size:11px;color:var(--muted);margin-top:3px}
  .dots span{display:inline-block;width:6px;height:6px;margin:0 1px;border-radius:50%;background:var(--muted);animation:b 1s infinite}
  .dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
  @keyframes b{0%,80%,100%{opacity:.3}40%{opacity:1}}
  .empty{color:var(--muted);text-align:center;margin-top:40px;font-size:14px;line-height:1.6}
  footer{border-top:1px solid var(--line);background:var(--card);padding:10px 14px}
  .inp{display:flex;gap:8px;max-width:760px;margin:0 auto}
  textarea{flex:1;resize:none;padding:11px 13px;border-radius:10px;border:1px solid var(--line);background:#11141a;color:var(--txt);font-size:15px;font-family:inherit;max-height:120px;line-height:1.4}
  .send{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:0 18px;font-weight:700;font-size:16px;cursor:pointer}
  .send:disabled{opacity:.5;cursor:default}
  .hint{max-width:760px;margin:6px auto 0;color:var(--muted);font-size:12px;text-align:center}
</style>
</head>
<body>
<header>
  <div class="t">Alex <small>ИИ-ассистент Prime Fusion · тест</small></div>
  <div>
    <button onclick="reset()">Сброс</button>
    <a href="/exceptions.html" class="panel">⚙ Панель</a>
  </div>
</header>

<main id="chat"></main>

<footer>
  <div class="inp">
    <textarea id="t" rows="1" placeholder="Напиши как клиент…"></textarea>
    <button class="send" id="send" onclick="send()">▶</button>
  </div>
  <div class="hint">Тест без WhatsApp. Alex использует ту же базу знаний, стиль и эскалацию.</div>
</footer>

<script>
let messages = [];
const chat = document.getElementById('chat');
const ta = document.getElementById('t');
const sendBtn = document.getElementById('send');

function esc(s){ return String(s||'').replace(/[&<>]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function scrollDown(){ chat.scrollTop = chat.scrollHeight; }

function render(){
  if(!messages.length){
    chat.innerHTML = '<div class="empty">Напиши сообщение как клиент —<br/>Alex ответит так же, как в WhatsApp.</div>';
    return;
  }
  chat.innerHTML = messages.map(m=>{
    if(m.role === 'user'){
      return `<div class="msg u"><div class="col"><div class="bubble">${esc(m.content)}</div></div></div>`;
    }
    let h = `<div class="msg a"><div class="col"><div class="bubble">${esc(m.content)}</div>`;
    if(m.escalated) h += `<div class="esc">🔔 передано Антону${m.reason ? ': ' + esc(m.reason) : ''}</div>`;
    if(m.meta) h += `<div class="meta">${esc(m.meta)}</div>`;
    return h + '</div></div>';
  }).join('');
  scrollDown();
}

function typing(on){
  let el = document.getElementById('typing');
  if(on){
    if(!el){
      chat.insertAdjacentHTML('beforeend','<div class="msg a" id="typing"><div class="col"><div class="bubble dots"><span></span><span></span><span></span></div></div></div>');
      scrollDown();
    }
  } else if(el){ el.remove(); }
}

async function send(){
  const text = ta.value.trim();
  if(!text) return;
  ta.value=''; ta.style.height='auto';
  messages.push({ role:'user', content:text });
  render();
  typing(true);
  sendBtn.disabled = true;
  try{
    const r = await fetch('/api/chat', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({ messages: messages.map(m=>({ role:m.role, content:m.content })) }),
    });
    const d = await r.json().catch(()=>({}));
    typing(false);
    if(!r.ok){
      messages.push({ role:'assistant', content:'⚠️ Ошибка: ' + (d.error || r.statusText) });
    } else {
      messages.push({ role:'assistant', content:d.reply, escalated:d.escalated, reason:d.reason, meta:`факты: ${d.facts} · стиль: ${d.examples}` });
    }
  } catch(e){
    typing(false);
    messages.push({ role:'assistant', content:'⚠️ Сеть: ' + e.message });
  }
  sendBtn.disabled = false;
  render();
  ta.focus();
}

function reset(){ messages = []; render(); ta.focus(); }

ta.addEventListener('input', ()=>{ ta.style.height='auto'; ta.style.height = Math.min(ta.scrollHeight,120) + 'px'; });
ta.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });

reset();
</script>
</body>
</html>
