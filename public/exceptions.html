<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Prime Fusion — исключения бота</title>
<style>
  :root{--bg:#0f1115;--card:#1a1d24;--line:#2a2f3a;--txt:#e7e9ee;--muted:#9aa3b2;--accent:#3b82f6;--danger:#ef4444;--ok:#22c55e}
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--txt)}
  .wrap{max-width:680px;margin:0 auto;padding:24px 16px 60px}
  h1{font-size:22px;margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 24px;font-size:14px;line-height:1.5}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:18px}
  .card h2{font-size:13px;margin:0 0 14px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:11px 0;border-top:1px solid var(--line)}
  .row:first-of-type{border-top:none}
  .who{display:flex;flex-direction:column;min-width:0}
  .who b{font-weight:600}
  .who small{color:var(--muted)}
  button{border:none;border-radius:9px;padding:9px 14px;font-size:14px;cursor:pointer;font-weight:600}
  .add{background:var(--accent);color:#fff;width:100%}
  .del{background:transparent;color:var(--danger);border:1px solid var(--danger)}
  input,select{width:100%;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:#11141a;color:var(--txt);font-size:14px}
  .field{margin-bottom:10px}
  .field label{display:block;font-size:13px;color:var(--muted);margin-bottom:5px}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .empty{color:var(--muted);padding:6px 0}
  hr{border:none;border-top:1px solid var(--line);margin:18px 0}
  .msg{font-size:14px;margin:10px 0 0;min-height:18px}
</style>
</head>
<body>
<div class="wrap">
  <p style="margin:0 0 10px"><a href="/" style="color:#3b82f6;text-decoration:none">← Чат с Alex</a></p>
  <h1>Исключения бота</h1>
  <p class="sub">Контакты из списка бот <b>игнорирует</b> — не отвечает им автоматически (жена, дочь и т.д.).<br/>Изменения применяются в течение ~15 секунд.</p>

  <div class="card">
    <h2>Переданные вопросы (ИИ передал человеку)</h2>
    <div id="escalations"><div class="empty">Загрузка…</div></div>
  </div>

  <div class="card">
    <h2>Сейчас в исключениях</h2>
    <div id="blocked"><div class="empty">Загрузка…</div></div>
  </div>

  <div class="card">
    <h2>Добавить из недавних</h2>
    <div class="field">
      <select id="seen"><option value="">— кто недавно писал боту —</option></select>
    </div>
    <button class="add" onclick="addFromSeen()">Добавить в исключения</button>

    <hr/>

    <h2>…или вручную по номеру</h2>
    <div class="grid">
      <div class="field"><label>Имя (для себя)</label><input id="mName" placeholder="Имя" /></div>
      <div class="field"><label>Номер с кодом страны</label><input id="mNumber" placeholder="12125551234" inputmode="numeric" /></div>
    </div>
    <button class="add" onclick="addManual()">Добавить</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script>
async function api(method, url, body){
  const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body: body?JSON.stringify(body):undefined});
  if(!r.ok){ const e = await r.json().catch(()=>({})); throw new Error(e.error || r.statusText); }
  return r.json();
}
function esc(s){ return String(s||'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function note(t, ok){ const m=document.getElementById('msg'); m.textContent=t; m.style.color= ok?'#22c55e':'#ef4444'; setTimeout(()=>{m.textContent='';}, 4000); }

async function loadBlocked(){
  const el = document.getElementById('blocked');
  try{
    const rows = await api('GET','/api/blocked');
    if(!rows.length){ el.innerHTML='<div class="empty">Пусто — бот отвечает всем.</div>'; return; }
    el.innerHTML = rows.map(r=>`
      <div class="row">
        <div class="who"><b>${esc(r.name)||'Без имени'}</b><small>${esc(r.number)}</small></div>
        <button class="del" onclick="unblock(${r.id})">Убрать</button>
      </div>`).join('');
  }catch(e){ el.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>'; }
}

async function loadSeen(){
  const sel = document.getElementById('seen');
  const cur = sel.value;
  try{
    const rows = await api('GET','/api/seen');
    sel.innerHTML = '<option value="">— кто недавно писал боту —</option>' +
      rows.map(r=>`<option value="${esc(r.number)}" data-name="${esc(r.name)}">${esc(r.name)||esc(r.number)} (${esc(r.number)})</option>`).join('');
    sel.value = cur;
  }catch(e){ /* молча */ }
}

async function addFromSeen(){
  const sel = document.getElementById('seen');
  const number = sel.value;
  if(!number){ note('Выбери контакт из списка', false); return; }
  const name = sel.options[sel.selectedIndex].dataset.name || '';
  try{ await api('POST','/api/blocked',{number, name}); note('Добавлено в исключения', true); refresh(); }
  catch(e){ note(e.message, false); }
}

async function addManual(){
  const name = document.getElementById('mName').value.trim();
  const number = document.getElementById('mNumber').value.trim();
  if(!number){ note('Введи номер', false); return; }
  try{
    await api('POST','/api/blocked',{number, name});
    note('Добавлено в исключения', true);
    document.getElementById('mName').value='';
    document.getElementById('mNumber').value='';
    refresh();
  }catch(e){ note(e.message, false); }
}

async function unblock(id){
  try{ await api('DELETE','/api/blocked/'+id); refresh(); }
  catch(e){ note(e.message, false); }
}

async function loadEscalations(){
  const el = document.getElementById('escalations');
  try{
    const rows = (await api('GET','/api/escalations')).filter(r=>!r.resolved);
    if(!rows.length){ el.innerHTML='<div class="empty">Нет новых вопросов.</div>'; return; }
    el.innerHTML = rows.map(r=>`
      <div class="row">
        <div class="who">
          <b>${esc(r.name)||esc(r.number)||'Клиент'}</b>
          <small>${esc(r.question)}</small>
          ${r.reason?`<small style="color:#d97706">↳ ${esc(r.reason)}</small>`:''}
        </div>
        <button class="add" style="width:auto" onclick="resolveEsc(${r.id})">Решено</button>
      </div>`).join('');
  }catch(e){ el.innerHTML='<div class="empty">Ошибка: '+esc(e.message)+'</div>'; }
}
async function resolveEsc(id){
  try{ await api('POST','/api/escalations/'+id+'/resolve'); loadEscalations(); }
  catch(e){ note(e.message, false); }
}

function refresh(){ loadEscalations(); loadBlocked(); loadSeen(); }
refresh();
setInterval(refresh, 10000);
</script>
</body>
</html>
